<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#grad)"/>
  <!-- Chart bars -->
  <rect x="100" y="300" width="60" height="112" rx="12" fill="white" opacity="0.9"/>
  <rect x="200" y="220" width="60" height="192" rx="12" fill="white" opacity="0.9"/>
  <rect x="300" y="160" width="60" height="252" rx="12" fill="white" opacity="0.9"/>
  <!-- Trend line -->
  <polyline points="130,295 230,215 330,155 410,100" stroke="white" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <!-- Dot at end of trend -->
  <circle cx="410" cy="100" r="18" fill="white" opacity="0.95"/>
</svg>
